<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Privado</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: #151311; /* Obsidian Ink */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #EED3BA; /* Almond Hearth */
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    .lock-card {
      max-width: 400px;
      width: 100%;
      padding: 40px 24px;
      background: rgba(75, 38, 47, 0.1); /* Sutil Velvet */
      border: 1px solid rgba(75, 38, 47, 0.3);
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .lock-icon {
      font-size: 3.8rem;
      margin-bottom: 20px;
      display: inline-block;
      animation: heartbeat 1.4s ease-in-out infinite;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #EED3BA;
    }
    p {
      font-size: .88rem;
      opacity: 0.6;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
      line-height: 1.5;
    }
    .btn-unlock {
      background: #4B262F; /* Velvet Curfew */
      color: #EED3BA;
      border: 1px solid rgba(238,211,186,0.15);
      padding: 14px 40px;
      font-size: .85rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      width: 100%;
    }
    .btn-unlock:hover {
      background: #63323E;
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(75,38,47,0.4);
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.08); }
      56% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="lock-card">
    <div class="lock-icon">❤️</div>
    <h2>¿A donde vas?</h2>
    <p><br>Por favor introduce la contraseña para pasar.</p>
    <button type="button" class="btn-unlock" id="btnAcceso">Entrar</button>
  </div>

<script>
  // 🔑 Contraseña encriptada segura (Clave real: boda2026)
  const HASH_CORRECTO = "66ef782705753c9ea5bdd1fa49f611d43d6384434e6b3ac2f75c9e44cb0316fc";

  document.getElementById('btnAcceso').addEventListener('click', async () => {
    try {
      const password = prompt("Introduce la contraseña de acceso: ♥");
      if (!password) return;

      if (!window.crypto || !window.crypto.subtle) {
        alert("Por seguridad del navegador, los accesos seguros requieren el link en vivo de internet (HTTPS). ¡Sube los cambios para probarlo!");
        return;
      }

      // Encriptación instantánea SHA-256
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const buffer = await window.crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(buffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      if (hashHex === HASH_CORRECTO) {
        // Al poner la clave bien, saltamos directo a la página de las cartas
        window.location.href = "home.html";
      } else {
        alert("Contraseña incorrecta... Acceso denegado. ❌");
      }
    } catch (error) {
      alert("Error en el sistema de verificación.");
    }
  });
</script>

</body>
</html>
